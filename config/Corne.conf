# --- Display widget tweaks ---
# https://zmk.dev/docs/config/displays
CONFIG_ZMK_WIDGET_WPM_STATUS=n
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=n
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=n

# Don't pull in the big LVGL fonts
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_26=n
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_26=n

# --- USB + split (explicit, also defaulted by shield) ---
CONFIG_ZMK_USB=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# --- BLE link tuning (matches PandaKB stock; fixes flaky L<->R) ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Workaround for Windows battery-report bug
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# --- Debounce (matches PandaKB stock) ---
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# --- Battery report cadence ---
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60
